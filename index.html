<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web歩数計 - ステップ2</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 40px; background: #f4f7f6; color: #333; }
        .box { background: white; margin: 20px auto; padding: 20px; width: 80%; max-width: 300px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .count { font-size: 5rem; font-weight: bold; color: #2ecc71; }
        .value { font-size: 1.5rem; font-weight: bold; color: #34495e; }
        button { padding: 12px 24px; font-size: 1.1rem; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 25px; margin: 10px; width: 150px; }
        button:disabled { background: #bdc3c7; }
    </style>
</head>
<body>

    <h1>マイ歩数計</h1>

    <div class="box">
        <p>現在の歩数</p>
        <div class="count" id="stepCount">0</div>
    </div>

    <div class="box">
        <p>全体の揺れの大きさ（合成加速度）</p>
        <div id="totalAcc" class="value">0.00</div>
    </div>

    <button id="requestBtn">計測開始</button>
    <button id="resetBtn" style="background: #e74c3c;">リセット</button>

    <script>
        let stepCount = 0;
        let lastStepTime = 0;

        // 【要調整】この数値を超えたら「1歩」とみなす（しきい値）
        const THRESHOLD = 13.0;
        // 【要調整】1歩カウントしてから次の1歩を受け付けるまでの最小時間（ミリ秒）
        const COOL_DOWN = 350;

        const requestBtn = document.getElementById('requestBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stepCountDisplay = document.getElementById('stepCount');
        const totalAccDisplay = document.getElementById('totalAcc');

        requestBtn.addEventListener('click', async () => {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startTracking();
                    } else { alert('許可が拒否されました'); }
                } catch (e) { alert('エラー: ' + e); }
            } else {
                startTracking();
            }
        });

        function startTracking() {
            requestBtn.textContent = "計測中...";
            requestBtn.disabled = true;

            window.addEventListener('devicemotion', (event) => {
                if (!event.accelerationIncludingGravity) return;

                const acc = event.accelerationIncludingGravity;

                // 3軸のベクトルを合成（三平方の定理）
                const totalAcc = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);

                // 画面に現在の揺れの大きさを表示
                totalAccDisplay.textContent = totalAcc.toFixed(2);

                // 条件①：揺れの大きさが「しきい値」を超えたか
                // 条件②：前回のカウントから350ミリ秒（0.35秒）以上経っているか（チャタリング防止）
                const currentTime = Date.now();
                if (totalAcc > THRESHOLD && (currentTime - lastStepTime) > COOL_DOWN) {
                    stepCount++;
                    stepCountDisplay.textContent = stepCount;
                    lastStepTime = currentTime; // 時間を更新
                }
            });
        }

        resetBtn.addEventListener('click', () => {
            stepCount = 0;
            stepCountDisplay.textContent = stepCount;
        });
    </script>
</body>
</html>
